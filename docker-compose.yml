services:
    database:
        image: mysql:8.0
        container_name: amd_db
        restart: always
        environment:
            MYSQL_DATABASE: app_db
            MYSQL_ROOT_PASSWORD: root  # Indispensable pour MySQL 8
            MYSQL_USER: user
            MYSQL_PASSWORD: password
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql

    phpmyadmin:
        image: phpmyadmin:latest
        container_name: amd_phpmyadmin
        ports:
            - "8082:80"
        environment:
            PMA_HOST: database
            PMA_PORT: 3306
            PMA_ARBITRARY: 1
            UPLOAD_LIMIT: 1G
            MEMORY_LIMIT: 2G
            MAX_EXECUTION_TIME: 0
        restart: always
        depends_on:
            - database

volumes:
    db_data:
