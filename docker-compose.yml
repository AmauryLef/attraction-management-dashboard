services:
    database:
        image: mysql:8.0
        container_name: attraction-management-dashboard
        restart: always
        environment:
            MYSQL_DATABASE: amd_db
            MYSQL_ROOT_PASSWORD: root
            MYSQL_USER: user
            MYSQL_PASSWORD: password
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql

    phpmyadmin:
        image: phpmyadmin:latest
        container_name: amd_phpmyadmin
        ports:
            - "8082:80"
        environment:
            PMA_HOST: database
            PMA_USER: root
            PMA_PASSWORD: root
            PMA_PORT: 3306
        restart: always
        depends_on:
            - database

volumes:
    db_data:
